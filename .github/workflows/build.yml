name: Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docker-runtime:
    name: Docker Runtime Build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build runtime image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: runtime
          tags: cmake-xray
          load: true
          cache-from: type=gha,scope=cmake-xray-runtime
          cache-to: type=gha,scope=cmake-xray-runtime,mode=max

      - name: Smoke test runtime image
        run: docker run --rm cmake-xray --help

  docs-examples-portability:
    # AP M5-1.8 A.5 follow-up: catch docs/examples DOT host-path drift
    # before the native matrix runs. GHA Build run #25123025175 surfaced
    # the bug in the linux-x86_64 native job after ~3 min of build +
    # ctest; this dedicated job uses the cached cmake-xray:test image,
    # bind-mounts the repo at /alt-mount instead of /workspace and
    # invokes scripts/verify-doc-examples-portability.sh, so the
    # divergent-prefix regression fails fast in under a minute (image
    # build cached) instead of waiting for the full native job.
    name: docs/examples Host-Portability
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: test
          tags: cmake-xray:test
          load: true
          cache-from: type=gha,scope=cmake-xray-test
          cache-to: type=gha,scope=cmake-xray-test,mode=max

      - name: Verify docs/examples host portability
        run: bash scripts/verify-doc-examples-portability.sh

  native:
    name: Native (${{ matrix.name }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
          - name: macos-arm64
            os: macos-latest
          - name: windows-x86_64
            os: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"
          cache: "pip"
          cache-dependency-path: tests/requirements-json-schema.txt

      - name: Install JSON schema validator dependency
        # Required by tests/validate_json_schema.py (AP M5-1.2 Tranche A gate).
        # --require-hashes refuses to install if any wheel hash drifts from
        # the lockfile; CTest fails loud if the dependency is missing.
        run: python -m pip install --disable-pip-version-check --require-hashes -r tests/requirements-json-schema.txt

      - name: Install pinned CMake
        # AP M5-1.7 Tranche A follow-up to the Kompatibilitaetsregel
        # "Mindestens ein Matrixjob pro Hostfamilie nutzt eine explizit
        # eingerichtete aktuelle CMake-/Compiler-Kombination statt nur
        # implizit vorinstallierter Runner-Defaults". The pip-installed
        # CMake from PyPI shadows the runner-default cmake on PATH (the
        # actions/setup-python venv prepends to PATH). The pinned version
        # is documented in docs/user/quality.md "Plattformstatus (AP M5-1.7)";
        # bumps go through the same review path as cmake/compiler
        # minimum bumps.
        shell: bash
        run: python -m pip install --disable-pip-version-check cmake==3.30.5

      - name: Install ccache for Linux native builds
        if: matrix.name == 'linux-x86_64'
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends ccache

      - name: Restore ccache
        if: matrix.name == 'linux-x86_64'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/ccache
          key: ccache-linux-x86_64-${{ hashFiles('CMakeLists.txt', 'src/**/*', 'tests/**/*', 'cmake/**', 'include/**/*') }}
          restore-keys: |
            ccache-linux-x86_64-

      - name: Show toolchain versions
        # AP M5-1.7 Tranche A: log host toolchain versions before
        # configure so PR reviewers and the Required-Check audit trail
        # always see which CMake/Python the platform job actually ran.
        # The Compiler-ID/Version fail-fast lives in
        # cmake/ToolchainMinimums.cmake and runs during Configure CMake
        # below; an under-minimum CMake or compiler will FATAL_ERROR
        # there before any build step starts.
        shell: bash
        run: |
          set -eu
          echo "::group::cmake --version"
          cmake --version
          echo "::endgroup::"
          echo "::group::python --version"
          python --version
          echo "::endgroup::"
          echo "::group::host info"
          uname -a || true
          echo "::endgroup::"

      - name: Configure CMake
        # AP M5-1.6 Tranche G fixup: ohne `shell: bash` waehlt
        # GitHub Actions auf windows-latest die PowerShell als Default
        # und parst das `if [ "$x" = "$y" ]; then`-Pattern als
        # PowerShell, was mit `Missing '(' after 'if'` abbricht.
        # `shell: bash` zwingt git-bash auf dem Windows-Runner.
        shell: bash
        run: |
          if [ "${{ matrix.name }}" = "linux-x86_64" ]; then
            export CCACHE_BASEDIR="$GITHUB_WORKSPACE"
            export CCACHE_DIR="$HOME/.cache/ccache"
            cmake -B build -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_C_COMPILER_LAUNCHER=ccache \
              -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          else
            cmake -B build -DCMAKE_BUILD_TYPE=Release
          fi

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Run tests
        run: ctest --test-dir build --output-on-failure -C Release --parallel

      - name: PowerShell platform smoke (Windows only)
        # AP M5-1.7 Tranche D.1: konvertierungsfreier zweiter Pflicht-
        # modus neben MSYS-Bash. Der Smoke umgeht MSYS und treibt die
        # echte cmake-xray.exe mit nativen Windows-Pfaden ueber alle
        # Pflichtkommandos aus plan-M5-1-7.md "Normative CLI-Smokes",
        # inklusive der --output-Smokes aus Tranche C.1. Ein roter
        # Smoke bricht den Required Check ohne dass MSYS-Bash-Magie
        # die Ursache verdecken koennte.
        if: matrix.name == 'windows-x86_64'
        shell: pwsh
        run: pwsh -File scripts/platform-smoke.ps1 -Binary build/Release/cmake-xray.exe

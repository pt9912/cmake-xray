name: Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docker-runtime:
    name: Docker Runtime Build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build runtime image
        run: docker build --target runtime -t cmake-xray .

      - name: Smoke test runtime image
        run: docker run --rm cmake-xray --help

name: Test

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # The three Docker pipelines run as parallel matrix jobs instead of three
  # sequential `docker build` invocations in one job. Each job derives
  # everything it needs from the shared `toolchain` stage; docker/build-push-
  # action keeps that layer in the GitHub-Actions cache (scope=cmake-xray-
  # toolchain), so subsequent pipelines reuse the apt-install cost. Total
  # wall-clock time drops from sum(test, coverage, quality) to max of the
  # three after the first cached run.
  docker-test:
    name: Docker ${{ matrix.label }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Test
            target: test
          - label: Coverage
            target: coverage-check
          - label: Quality
            target: quality-check

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Coverage matrix entry: build the coverage report stage first so the
      # extraction below has access to gcovr's output, then derive the
      # threshold check from the cached coverage layer.
      - name: Build coverage report image
        if: matrix.target == 'coverage-check'
        uses: docker/build-push-action@v5
        with:
          context: .
          target: coverage
          tags: cmake-xray:coverage
          load: true
          cache-from: type=gha,scope=cmake-xray-toolchain
          cache-to: type=gha,scope=cmake-xray-toolchain,mode=max

      - name: Extract coverage reports
        if: matrix.target == 'coverage-check'
        run: |
          mkdir -p artifacts/coverage
          container_id=$(docker create cmake-xray:coverage)
          docker cp "$container_id:/workspace/build-coverage/coverage/summary.txt" artifacts/coverage/summary.txt
          docker cp "$container_id:/workspace/build-coverage/coverage/coverage.txt" artifacts/coverage/coverage.txt
          docker rm "$container_id"

      - name: Show coverage summary
        if: matrix.target == 'coverage-check'
        run: cat artifacts/coverage/summary.txt

      - name: Upload coverage artifacts
        if: matrix.target == 'coverage-check'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: artifacts/coverage

      # Quality matrix entry: build the quality report stage first, extract
      # the four report files, then derive the threshold check.
      - name: Build quality report image
        if: matrix.target == 'quality-check'
        uses: docker/build-push-action@v5
        with:
          context: .
          target: quality
          tags: cmake-xray:quality
          load: true
          cache-from: type=gha,scope=cmake-xray-toolchain
          cache-to: type=gha,scope=cmake-xray-toolchain,mode=max

      - name: Extract quality reports
        if: matrix.target == 'quality-check'
        run: |
          mkdir -p artifacts/quality
          container_id=$(docker create cmake-xray:quality)
          docker cp "$container_id:/workspace/build-quality/quality/summary.txt" artifacts/quality/summary.txt
          docker cp "$container_id:/workspace/build-quality/quality/clang-tidy.txt" artifacts/quality/clang-tidy.txt
          docker cp "$container_id:/workspace/build-quality/quality/lizard.txt" artifacts/quality/lizard.txt
          docker cp "$container_id:/workspace/build-quality/quality/lizard-warnings.txt" artifacts/quality/lizard-warnings.txt
          docker rm "$container_id"

      - name: Show quality summary
        if: matrix.target == 'quality-check'
        run: cat artifacts/quality/summary.txt

      - name: Upload quality artifacts
        if: matrix.target == 'quality-check'
        uses: actions/upload-artifact@v7
        with:
          name: quality-report
          path: artifacts/quality

      # Final gate per matrix entry. test runs ctest; coverage-check enforces
      # the 100% line coverage threshold; quality-check enforces clang-tidy 0
      # / lizard 0. All three reuse the cached toolchain layer.
      - name: Build ${{ matrix.target }} gate
        uses: docker/build-push-action@v5
        with:
          context: .
          target: ${{ matrix.target }}
          tags: cmake-xray:${{ matrix.target }}
          load: true
          build-args: |
            ${{ matrix.target == 'coverage-check' && 'XRAY_COVERAGE_THRESHOLD=100' || '' }}
          cache-from: type=gha,scope=cmake-xray-toolchain
          cache-to: type=gha,scope=cmake-xray-toolchain,mode=max

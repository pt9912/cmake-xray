name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

# AP M5-1.6 Tranche E: OCI publish is enabled. The Tranche-C gate
# (XRAY_OCI_PUBLISH_ENABLED) stays as a kill-switch so a future
# regression scenario can disable the push by flipping the flag back to
# "false" without rewriting the workflow. The `gh api` idempotency,
# allowlist guard and three-way version-consistency check are
# unconditional pre-flight steps.
env:
  XRAY_OCI_PUBLISH_ENABLED: "true"

jobs:
  verify:
    name: Verify (Docker)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Derive release metadata
        id: meta
        run: |
          set -eu
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          image_repo="ghcr.io/${GITHUB_REPOSITORY,,}"

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "image_repo=${image_repo}" >> "$GITHUB_OUTPUT"

      - name: Verify test image
        run: docker build --target test -t cmake-xray:test .

      - name: Verify coverage gate
        run: docker build --target coverage-check --build-arg XRAY_COVERAGE_THRESHOLD=100 -t cmake-xray:coverage-check .

      - name: Verify quality gate
        run: docker build --target quality-check -t cmake-xray:quality-check .

      # AP M5-1.6 Tranche C: build the OCI runtime image via the
      # publish-script so the local image is tagged exactly as the
      # versioned remote (image_repo:version, no leading 'v') and the
      # subsequent push step (gated) operates on the same artifact.
      - name: Build OCI runtime image
        run: |
          bash scripts/oci-image-publish.sh \
            "${{ steps.meta.outputs.image_repo }}" \
            "${{ steps.meta.outputs.version }}" \
            build

      - name: Smoke test OCI image (--help)
        run: |
          docker run --rm \
            "${{ steps.meta.outputs.image_repo }}:${{ steps.meta.outputs.version }}" \
            --help > /dev/null

      - name: Smoke test OCI image (--version matches tag)
        run: |
          set -eu
          extracted=$(docker run --rm \
            "${{ steps.meta.outputs.image_repo }}:${{ steps.meta.outputs.version }}" \
            --version)
          expected="${{ steps.meta.outputs.version }}"
          if [ "$extracted" != "$expected" ]; then
            echo "error: OCI --version='${extracted}' does not match expected '${expected}'" >&2
            exit 1
          fi

      - name: Smoke test markdown analyze path
        run: |
          docker run --rm \
            -v "$PWD/tests/e2e/testdata/m3:/data:ro" \
            "${{ steps.meta.outputs.image_repo }}:${{ steps.meta.outputs.version }}" \
            analyze \
            --compile-commands /data/report_project/compile_commands.json \
            --format markdown

      - name: Smoke test markdown impact path
        run: |
          docker run --rm \
            -v "$PWD/tests/e2e/testdata/m3:/data:ro" \
            "${{ steps.meta.outputs.image_repo }}:${{ steps.meta.outputs.version }}" \
            impact \
            --compile-commands /data/report_impact_header/compile_commands.json \
            --changed-file include/common/config.h \
            --format markdown

      # AP M5-1.6 Tranche B: build the reproducible Linux release archive
      # via the release-archive Docker stage, verify the SHA-256 sidecar,
      # extract the bundled binary and smoke-test --help / --version. The
      # SOURCE_DATE_EPOCH is derived from the tag's commit timestamp per
      # plan-M5-1-6.md "Entscheidungen". The verify smoke runs before any
      # publish step so a broken archive blocks the release.
      - name: Build and smoke test linux release archive
        run: |
          set -eu
          version="${{ steps.meta.outputs.version }}"
          tag="${{ steps.meta.outputs.tag }}"
          source_date_epoch=$(git log -1 --pretty=%ct "$tag")

          docker build --target release-archive \
            --build-arg XRAY_APP_VERSION="$version" \
            --build-arg SOURCE_DATE_EPOCH="$source_date_epoch" \
            -t cmake-xray:release-archive .

          mkdir -p release-archive-out
          docker run --rm -v "$PWD/release-archive-out:/output" cmake-xray:release-archive

          archive_name="cmake-xray_${version}_linux_x86_64.tar.gz"
          ( cd release-archive-out && sha256sum -c "${archive_name}.sha256" )

          mkdir -p release-archive-extracted
          tar -xf "release-archive-out/${archive_name}" -C release-archive-extracted
          ./release-archive-extracted/cmake-xray --help > /dev/null
          extracted_version=$(./release-archive-extracted/cmake-xray --version)
          if [ "$extracted_version" != "$version" ]; then
            echo "error: extracted binary --version='${extracted_version}' does not match expected '${version}'" >&2
            exit 1
          fi

      # AP M5-1.6 Tranche C: gated OCI publish. Tranche-E will move this
      # to a dedicated publish job; for now the steps stay in the Verify-
      # Job behind an env-flag (XRAY_OCI_PUBLISH_ENABLED), so a re-run of
      # this workflow with the flag still 'false' performs build+smoke
      # without ever pushing to GHCR.
      - name: Log in to GHCR
        if: env.XRAY_OCI_PUBLISH_ENABLED == 'true'
        run: echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Publish OCI image (versioned tag)
        if: env.XRAY_OCI_PUBLISH_ENABLED == 'true'
        run: |
          bash scripts/oci-image-publish.sh \
            "${{ steps.meta.outputs.image_repo }}" \
            "${{ steps.meta.outputs.version }}" \
            push

      - name: Publish OCI image (latest tag for stable releases)
        if: env.XRAY_OCI_PUBLISH_ENABLED == 'true'
        run: |
          set -eu
          version="${{ steps.meta.outputs.version }}"
          if [[ "$version" == *-* ]]; then
            echo "skipping latest update for prerelease ${version}"
            exit 0
          fi
          bash scripts/oci-image-publish.sh \
            "${{ steps.meta.outputs.image_repo }}" \
            "$version" \
            latest

  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}

    # AP M5-1.6 Tranche E: macOS-/Windows-Plattform-Jobs sind aus dem
    # offiziellen M5-Release deaktiviert. Plan-Sektion "Plattformartefakte
    # macOS/Windows" sagt: "macOS darf hoechstens validated_smoke
    # erreichen", und ohne aktiven Preview-Publish-Pfad sind sie nicht
    # Bestandteil des M5-Releases. Eine spaetere Tranche kann einen
    # separaten Preview-Job mit eigener Allowlist, eigener Tag-Konvention
    # und Prerelease-Markierung anlegen; bis dahin bleibt nur der
    # Linux-x86_64-Eintrag in der Build-Matrix, sodass keine Datei
    # ausserhalb der Allowlist im finalen Release-Job landet.
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            artifact: linux_x86_64
            archive_ext: tar.gz

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install JSON schema validator dependency
        # Required by tests/validate_json_schema.py (AP M5-1.2 Tranche A gate).
        # --require-hashes refuses to install if any wheel hash drifts from
        # the lockfile; CTest fails loud if the dependency is missing.
        run: python -m pip install --upgrade pip && python -m pip install --require-hashes -r tests/requirements-json-schema.txt

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Run tests
        run: ctest --test-dir build --output-on-failure -C Release

      - name: Derive archive name
        id: meta
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          archive="cmake-xray_${version}_${{ matrix.artifact }}.${{ matrix.archive_ext }}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "archive=${archive}" >> "$GITHUB_OUTPUT"

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          set -eu
          mkdir -p release-assets/package
          cp build/cmake-xray LICENSE README.md release-assets/package/
          tar -C release-assets/package -czf "release-assets/${{ steps.meta.outputs.archive }}" \
            cmake-xray LICENSE README.md
          sha256sum "release-assets/${{ steps.meta.outputs.archive }}" \
            > "release-assets/${{ steps.meta.outputs.archive }}.sha256"
          rm -rf release-assets/package

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release-assets/package -Force | Out-Null
          Copy-Item build/Release/cmake-xray.exe, LICENSE, README.md release-assets/package/
          Compress-Archive -Path release-assets/package/* -DestinationPath "release-assets/${{ steps.meta.outputs.archive }}"
          $hash = (Get-FileHash "release-assets/${{ steps.meta.outputs.archive }}" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ steps.meta.outputs.archive }}" | Out-File -Encoding ascii "release-assets/${{ steps.meta.outputs.archive }}.sha256"
          Remove-Item -Recurse -Force release-assets/package

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.artifact }}
          path: release-assets/*
          retention-days: 1

  release:
    name: Publish Release
    needs: [verify, build]
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Derive release metadata
        id: meta
        run: |
          set -eu
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          image_repo="ghcr.io/${GITHUB_REPOSITORY,,}"

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "image_repo=${image_repo}" >> "$GITHUB_OUTPUT"

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: release-*
          merge-multiple: true

      - name: List release assets
        run: ls -la release-assets/

      - name: Prepare release notes
        run: |
          set -eu
          ver_esc=$(printf '%s' "${{ steps.meta.outputs.version }}" | sed 's/\./\\./g')
          notes_path="release-assets/release-notes.md"
          sed -n "/^## \\[$ver_esc\\]/,/^## \\[/{/^## \\[$ver_esc\\]/!{/^## \\[/!p}}" \
            CHANGELOG.md > "$notes_path"

          if [ ! -s "$notes_path" ]; then
            {
              echo "Release ${{ steps.meta.outputs.tag }}"
              echo
              echo "Automated release for ${{ steps.meta.outputs.tag }}."
              echo
              echo "Assets:"
              echo "- OCI image: ${{ steps.meta.outputs.image_repo }}:${{ steps.meta.outputs.version }}"
            } > "$notes_path"
          fi

      # AP M5-1.6 Tranche E: hard-fail if any candidate asset is outside
      # the M5 allowlist (linux archive plus its sha256 sidecar). Plan-
      # Vertrag: "Jeder Publish-Schritt verwendet eine explizite
      # Allowlist fuer offizielle Asset-Namen und OCI-Tags. Dateien
      # ausserhalb dieser Allowlist, insbesondere Preview-Artefakte,
      # fuehren im finalen Release-Job zum Abbruch."
      - name: Allowlist guard for release assets
        run: |
          set -eu
          version="${{ steps.meta.outputs.version }}"
          assets=()
          for f in release-assets/cmake-xray_*; do
            assets+=("$f")
          done
          bash scripts/release-allowlist.sh "$version" "${assets[@]}"

      # AP M5-1.6 Tranche E: three-way version-consistency check pinned
      # against the canonical sources. Tag, --version output (from the
      # OCI image tag pushed earlier in the verify job), and the asset
      # naming convention must agree exactly; otherwise we abort before
      # the GitHub-Release publish step.
      - name: Three-way version consistency check
        run: |
          set -eu
          tag="${{ steps.meta.outputs.tag }}"
          version="${{ steps.meta.outputs.version }}"
          image_repo="${{ steps.meta.outputs.image_repo }}"

          if [ "$tag" != "v${version}" ]; then
            echo "error: tag '$tag' does not match v${version}" >&2
            exit 1
          fi

          for f in release-assets/cmake-xray_*; do
            name=$(basename "$f")
            case "$name" in
              *"_${version}_"*) ;;
              *)
                echo "error: asset '$name' does not contain version '$version'" >&2
                exit 1 ;;
            esac
          done

          if ! docker buildx imagetools inspect "${image_repo}:${version}" \
                 --format '{{.Manifest.Digest}}' >/dev/null 2>&1; then
            echo "error: OCI image ${image_repo}:${version} is not reachable; verify-job push must precede the release-job" >&2
            exit 1
          fi

          echo "version consistency check passed: tag=$tag version=$version"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          tag="${{ steps.meta.outputs.tag }}"
          notes="release-assets/release-notes.md"

          # Collect all archives and checksums (exclude release-notes.md);
          # the Allowlist guard above has already verified the basenames.
          assets=()
          for f in release-assets/cmake-xray_*; do
            assets+=("$f")
          done

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --notes-file "$notes"
            gh release upload "$tag" "${assets[@]}" --clobber
          else
            gh release create "$tag" \
              --verify-tag \
              --title "$tag" \
              --notes-file "$notes" \
              "${assets[@]}"
          fi

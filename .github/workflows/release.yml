name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

# AP M5-1.6 Tranche H.1: OCI publish is enabled and lives in the
# release-job (post-Tranche-G the Tranche-C verify-job push has been
# moved). XRAY_OCI_PUBLISH_ENABLED stays as a kill-switch so a future
# regression scenario can disable the push by flipping the flag back
# to "false" without rewriting the workflow; it now gates the
# release-job Login/Push/latest steps. Allowlist guard, idempotency
# helper, and three-way version-consistency check are unconditional
# pre-flight steps.
env:
  XRAY_OCI_PUBLISH_ENABLED: "true"

jobs:
  # AP M5-1.6 Tranche G.1: harte Pre-Build-Gate-Stage. plan-M5-1-6.md
  # SemVer-Tag-Muster verlangt "Die Tag-Pruefung muss vor Build/Publish
  # laufen und den Workflow mit nonzero Ergebnis beenden". Vor Tranche G
  # leitete jeder Job seinen `version`-String selbst per `${tag#v}` ab,
  # ohne das Validator-Skript zu konsultieren; ein malformierter Tag wie
  # `vfoo` oder `v01.2.3` haette die Build- und Publish-Steps trotzdem
  # erreicht. validate-release-tag.sh ist nun die einzige Quelle fuer
  # `version`; alle anderen Jobs lesen den Wert aus den Job-Outputs.
  validate-tag:
    name: Validate release tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      image_repo: ${{ steps.meta.outputs.image_repo }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate tag and derive metadata
        id: meta
        run: |
          set -eu
          tag="${GITHUB_REF_NAME}"
          version=$(bash scripts/validate-release-tag.sh "$tag")
          if [ -z "$version" ]; then
            echo "error: validate-release-tag.sh produced empty version for $tag" >&2
            exit 1
          fi
          image_repo="ghcr.io/${GITHUB_REPOSITORY,,}"

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "image_repo=${image_repo}" >> "$GITHUB_OUTPUT"

  verify:
    name: Verify (Docker)
    needs: validate-tag
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Verify test image
        run: docker build --target test -t cmake-xray:test .

      - name: Verify coverage gate
        run: docker build --target coverage-check --build-arg XRAY_COVERAGE_THRESHOLD=100 -t cmake-xray:coverage-check .

      - name: Verify quality gate
        run: docker build --target quality-check -t cmake-xray:quality-check .

      # AP M5-1.6 Tranche C: build the OCI runtime image via the
      # publish-script so the local image is tagged exactly as the
      # versioned remote (image_repo:version, no leading 'v') and the
      # subsequent push step (gated) operates on the same artifact.
      - name: Build OCI runtime image
        run: |
          bash scripts/oci-image-publish.sh \
            "${{ needs.validate-tag.outputs.image_repo }}" \
            "${{ needs.validate-tag.outputs.version }}" \
            build

      - name: Smoke test OCI image (--help)
        run: |
          docker run --rm \
            "${{ needs.validate-tag.outputs.image_repo }}:${{ needs.validate-tag.outputs.version }}" \
            --help > /dev/null

      - name: Smoke test OCI image (--version matches tag)
        run: |
          set -eu
          extracted=$(docker run --rm \
            "${{ needs.validate-tag.outputs.image_repo }}:${{ needs.validate-tag.outputs.version }}" \
            --version)
          expected="${{ needs.validate-tag.outputs.version }}"
          if [ "$extracted" != "$expected" ]; then
            echo "error: OCI --version='${extracted}' does not match expected '${expected}'" >&2
            exit 1
          fi

      - name: Smoke test markdown analyze path
        run: |
          docker run --rm \
            -v "$PWD/tests/e2e/testdata/m3:/data:ro" \
            "${{ needs.validate-tag.outputs.image_repo }}:${{ needs.validate-tag.outputs.version }}" \
            analyze \
            --compile-commands /data/report_project/compile_commands.json \
            --format markdown

      - name: Smoke test markdown impact path
        run: |
          docker run --rm \
            -v "$PWD/tests/e2e/testdata/m3:/data:ro" \
            "${{ needs.validate-tag.outputs.image_repo }}:${{ needs.validate-tag.outputs.version }}" \
            impact \
            --compile-commands /data/report_impact_header/compile_commands.json \
            --changed-file include/common/config.h \
            --format markdown

      # AP M5-1.6 Tranche B: build the reproducible Linux release archive
      # via the release-archive Docker stage, verify the SHA-256 sidecar,
      # extract the bundled binary and smoke-test --help / --version. The
      # SOURCE_DATE_EPOCH is derived from the tag's commit timestamp per
      # plan-M5-1-6.md "Entscheidungen". The verify smoke runs before any
      # publish step so a broken archive blocks the release.
      - name: Build and smoke test linux release archive
        run: |
          set -eu
          version="${{ needs.validate-tag.outputs.version }}"
          tag="${{ needs.validate-tag.outputs.tag }}"
          source_date_epoch=$(git log -1 --pretty=%ct "$tag")

          docker build --target release-archive \
            --build-arg XRAY_APP_VERSION="$version" \
            --build-arg SOURCE_DATE_EPOCH="$source_date_epoch" \
            -t cmake-xray:release-archive .

          mkdir -p release-archive-out
          docker run --rm -v "$PWD/release-archive-out:/output" cmake-xray:release-archive

          archive_name="cmake-xray_${version}_linux_x86_64.tar.gz"
          ( cd release-archive-out && sha256sum -c "${archive_name}.sha256" )

          mkdir -p release-archive-extracted
          tar -xf "release-archive-out/${archive_name}" -C release-archive-extracted
          ./release-archive-extracted/cmake-xray --help > /dev/null
          extracted_version=$(./release-archive-extracted/cmake-xray --version)
          if [ "$extracted_version" != "$version" ]; then
            echo "error: extracted binary --version='${extracted_version}' does not match expected '${version}'" >&2
            exit 1
          fi

      # AP M5-1.6 Tranche H.1: der OCI-Push lebt nicht mehr im Verify-
      # Job. plan-M5-1-6.md "Veroeffentlichungskette" verlangt, dass
      # Publish-Steps ausschliesslich im finalen Release-Job laufen,
      # *nachdem* Verify und Build beide green sind. Vor Tranche H lief
      # der OCI-Push aus Verify heraus, parallel zu Build -- ein
      # gebrochener Build-Job haette einen bereits gepushten OCI-Tag
      # ohne dazugehoerigen GitHub-Release hinterlassen. Die Push-,
      # Login- und latest-Schritte sind in den `release`-Job
      # umgezogen; der Verify-Job baut und smoket nur noch lokal.

  build:
    name: Build (${{ matrix.name }})
    needs: validate-tag
    runs-on: ${{ matrix.os }}

    # AP M5-1.6 Tranche E: macOS-/Windows-Plattform-Jobs sind aus dem
    # offiziellen M5-Release deaktiviert. Plan-Sektion "Plattformartefakte
    # macOS/Windows" sagt: "macOS darf hoechstens validated_smoke
    # erreichen", und ohne aktiven Preview-Publish-Pfad sind sie nicht
    # Bestandteil des M5-Releases. Eine spaetere Tranche kann einen
    # separaten Preview-Job mit eigener Allowlist, eigener Tag-Konvention
    # und Prerelease-Markierung anlegen; bis dahin bleibt nur der
    # Linux-x86_64-Eintrag in der Build-Matrix, sodass keine Datei
    # ausserhalb der Allowlist im finalen Release-Job landet.
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            artifact: linux_x86_64
            archive_ext: tar.gz

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      # AP M5-1.6 Tranche G.2: der publishte Linux-Archiv-Build laeuft
      # ueber dieselbe `release-archive`-Docker-Stage wie der
      # Verify-Job-Archiv-Smoke. Vor Tranche G nutzte der Build-Job
      # einen plain `cmake -B build` plus `tar -czf` ohne
      # `XRAY_APP_VERSION`, ohne `SOURCE_DATE_EPOCH` und ohne die
      # ustar-/`gzip -n`-Repro-Flags aus
      # `scripts/build-release-archive.sh`; das publishte Archiv war
      # damit weder versionsstabil noch byte-reproduzierbar trotz
      # gruener Repro-Smokes im Verify-Job. Die Test-/Coverage-/Quality-
      # Gates aus dem alten `Run tests`-Step laufen weiterhin im
      # Verify-Job (`docker build --target test/coverage-check/
      # quality-check`); ein duplizierter Native-CTest im Build-Job
      # verlaengerte den Release-Lauf um ~13 min ohne neuen Pruefwert.
      - name: Build reproducible release archive
        run: |
          set -eu
          version="${{ needs.validate-tag.outputs.version }}"
          tag="${{ needs.validate-tag.outputs.tag }}"
          source_date_epoch=$(git log -1 --pretty=%ct "$tag")

          docker build --target release-archive \
            --build-arg XRAY_APP_VERSION="$version" \
            --build-arg SOURCE_DATE_EPOCH="$source_date_epoch" \
            -t cmake-xray:release-archive .

          mkdir -p release-assets
          docker run --rm -v "$PWD/release-assets:/output" cmake-xray:release-archive

          archive_name="cmake-xray_${version}_${{ matrix.artifact }}.${{ matrix.archive_ext }}"
          if [ ! -f "release-assets/${archive_name}" ] || [ ! -f "release-assets/${archive_name}.sha256" ]; then
            echo "error: release-archive stage did not produce expected files" >&2
            ls -la release-assets/ >&2
            exit 1
          fi
          ( cd release-assets && sha256sum -c "${archive_name}.sha256" )

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.artifact }}
          path: release-assets/*
          retention-days: 1

  release:
    name: Publish Release
    needs: [validate-tag, verify, build]
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: release-*
          merge-multiple: true

      - name: List release assets
        run: ls -la release-assets/

      - name: Prepare release notes
        run: |
          set -eu
          ver_esc=$(printf '%s' "${{ needs.validate-tag.outputs.version }}" | sed 's/\./\\./g')
          notes_path="release-assets/release-notes.md"
          sed -n "/^## \\[$ver_esc\\]/,/^## \\[/{/^## \\[$ver_esc\\]/!{/^## \\[/!p}}" \
            CHANGELOG.md > "$notes_path"

          if [ ! -s "$notes_path" ]; then
            {
              echo "Release ${{ needs.validate-tag.outputs.tag }}"
              echo
              echo "Automated release for ${{ needs.validate-tag.outputs.tag }}."
              echo
              echo "Assets:"
              echo "- OCI image: ${{ needs.validate-tag.outputs.image_repo }}:${{ needs.validate-tag.outputs.version }}"
            } > "$notes_path"
          fi

      # AP M5-1.6 Tranche E: hard-fail if any candidate asset is outside
      # the M5 allowlist (linux archive plus its sha256 sidecar). Plan-
      # Vertrag: "Jeder Publish-Schritt verwendet eine explizite
      # Allowlist fuer offizielle Asset-Namen und OCI-Tags. Dateien
      # ausserhalb dieser Allowlist, insbesondere Preview-Artefakte,
      # fuehren im finalen Release-Job zum Abbruch."
      - name: Allowlist guard for release assets
        run: |
          set -eu
          version="${{ needs.validate-tag.outputs.version }}"
          assets=()
          for f in release-assets/cmake-xray_*; do
            assets+=("$f")
          done
          bash scripts/release-allowlist.sh "$version" "${assets[@]}"

      # AP M5-1.6 Tranche H.2: erster Schritt der Plan-Sequenz
      # `draft_release_created -> oci_image_published ->
      # release_published`. Vor Tranche H rief der Workflow den
      # Idempotency-Helper *ohne* `--draft` und erstellte einen
      # public Release direkt -- das umgeht den Plan-Vertrag (plan-
      # M5-1-6.md "Veroeffentlichungskette") und macht eine partielle
      # OCI-Publish-Failure ueber Endnutzer sichtbar. Der Helper
      # erstellt jetzt einen Draft-Release; `--draft` wirkt nur am
      # `gh release create`-Pfad. Re-Runs eines bereits public
      # Release durchlaufen den Validate-und-Upload-Missing-Pfad
      # ohne den Draft-Status zu modifizieren.
      - name: Create draft GitHub release (manifest idempotency)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          tag="${{ needs.validate-tag.outputs.tag }}"
          notes="release-assets/release-notes.md"

          # Collect all archives and checksums (exclude release-notes.md);
          # the Allowlist guard above has already verified the basenames.
          assets=()
          for f in release-assets/cmake-xray_*; do
            assets+=("$f")
          done

          bash scripts/release-publish-idempotency.sh --draft \
            "$tag" "$notes" "${assets[@]}"

      # AP M5-1.6 Tranche H.1: OCI-Push lebt jetzt im Release-Job.
      # plan-M5-1-6.md "Veroeffentlichungskette" verlangt, dass jeder
      # Publish-Step ausschliesslich nach erfolgreichem Verify *und*
      # erfolgreichem Build laeuft. Vor Tranche H lief der Push aus
      # dem Verify-Job parallel zum Build; ein gebrochener Build
      # haette einen bereits gepushten OCI-Tag ohne dazugehoerige
      # GitHub-Release-Assets hinterlassen. Der Versions-Tag-Push
      # muss laut Plan vor `latest` laufen und beide muessen vor dem
      # finalen `release_published` greifen.
      - name: Log in to GHCR
        if: env.XRAY_OCI_PUBLISH_ENABLED == 'true'
        run: echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Publish OCI image (versioned tag)
        if: env.XRAY_OCI_PUBLISH_ENABLED == 'true'
        run: |
          bash scripts/oci-image-publish.sh \
            "${{ needs.validate-tag.outputs.image_repo }}" \
            "${{ needs.validate-tag.outputs.version }}" \
            push

      - name: Publish OCI image (latest tag for stable releases)
        if: env.XRAY_OCI_PUBLISH_ENABLED == 'true'
        run: |
          set -eu
          version="${{ needs.validate-tag.outputs.version }}"
          if [[ "$version" == *-* ]]; then
            echo "skipping latest update for prerelease ${version}"
            exit 0
          fi
          bash scripts/oci-image-publish.sh \
            "${{ needs.validate-tag.outputs.image_repo }}" \
            "$version" \
            latest

      # AP M5-1.6 Tranche E: three-way version-consistency check pinned
      # against the canonical sources. Tag, --version output (from the
      # OCI image tag we just pushed above), and the asset naming
      # convention must agree exactly; otherwise we abort before the
      # GitHub-Release publish step.
      - name: Three-way version consistency check
        run: |
          set -eu
          tag="${{ needs.validate-tag.outputs.tag }}"
          version="${{ needs.validate-tag.outputs.version }}"
          image_repo="${{ needs.validate-tag.outputs.image_repo }}"

          if [ "$tag" != "v${version}" ]; then
            echo "error: tag '$tag' does not match v${version}" >&2
            exit 1
          fi

          for f in release-assets/cmake-xray_*; do
            name=$(basename "$f")
            case "$name" in
              *"_${version}_"*) ;;
              *)
                echo "error: asset '$name' does not contain version '$version'" >&2
                exit 1 ;;
            esac
          done

          if ! docker buildx imagetools inspect "${image_repo}:${version}" \
                 --format '{{.Manifest.Digest}}' >/dev/null 2>&1; then
            echo "error: OCI image ${image_repo}:${version} is not reachable; the publish step earlier in this job must succeed first" >&2
            exit 1
          fi

          # AP M5-1.6 Tranche F.2: third leg of the version-consistency
          # contract. Plan-Vertrag verlangt "Tag-ohne-`v`,
          # `cmake-xray --version`-Ausgabe und Release-Publish-Metadaten"
          # exakt gleich. Der Verify-Job pinnt das `--version` schon am
          # Linux-Archiv-Binary (extrahiert aus dem Repro-Archiv) und am
          # lokal gebauten OCI-Image (pre-push). Dieser Step pinnt es
          # zusaetzlich am tatsaechlich publishten OCI-Image (post-push,
          # aus der Registry, nicht aus Local-Cache), um Drift zwischen
          # Pre-Push-Build und Push-Roundtrip abzufangen.
          oci_version=$(docker run --rm "${image_repo}:${version}" --version)
          if [ "$oci_version" != "$version" ]; then
            echo "error: OCI image --version='${oci_version}' does not match expected '${version}'" >&2
            exit 1
          fi

          echo "version consistency check passed: tag=$tag version=$version"

      # AP M5-1.6 Tranche H.2: finaler Plan-Schritt `release_published`.
      # Erst wenn Allowlist, Idempotenz, OCI-Push und Drei-Wege-
      # Versionscheck alle gruen sind, wird der Draft public. Eine
      # Failure in einem der vorherigen Steps laesst den Draft im
      # nicht-publishten Zustand zurueck, sodass Endnutzer keinen
      # halb-publishten Release sehen. Re-Runs eines bereits public
      # Release sind no-op (`--draft=false` auf einem nicht-Draft
      # ist idempotent).
      - name: Promote draft release to public
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          tag="${{ needs.validate-tag.outputs.tag }}"
          gh release edit "$tag" --draft=false >/dev/null
          echo "release '$tag' promoted to public"

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  publish-release:
    name: Publish Release Artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Derive release metadata
        id: meta
        run: |
          set -eu
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          image_repo="ghcr.io/${GITHUB_REPOSITORY,,}"
          archive="cmake-xray_${version}_linux_x86_64.tar.gz"
          checksum="${archive}.sha256"

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "image_repo=${image_repo}" >> "$GITHUB_OUTPUT"
          echo "archive=${archive}" >> "$GITHUB_OUTPUT"
          echo "checksum=${checksum}" >> "$GITHUB_OUTPUT"

      - name: Verify test image
        run: docker build --target test -t cmake-xray:test .

      - name: Verify coverage gate
        run: docker build --target coverage-check --build-arg XRAY_COVERAGE_THRESHOLD=100 -t cmake-xray:coverage-check .

      - name: Verify quality gate
        run: docker build --target quality-check -t cmake-xray:quality-check .

      - name: Build runtime image
        run: docker build --target runtime -t "cmake-xray:${{ steps.meta.outputs.tag }}" .

      - name: Smoke test runtime image
        run: docker run --rm "cmake-xray:${{ steps.meta.outputs.tag }}" --help

      - name: Smoke test markdown analyze path
        run: |
          docker run --rm \
            -v "$PWD/tests/e2e/testdata/m3:/data:ro" \
            "cmake-xray:${{ steps.meta.outputs.tag }}" \
            analyze \
            --compile-commands /data/report_project/compile_commands.json \
            --format markdown

      - name: Smoke test markdown impact path
        run: |
          docker run --rm \
            -v "$PWD/tests/e2e/testdata/m3:/data:ro" \
            "cmake-xray:${{ steps.meta.outputs.tag }}" \
            impact \
            --compile-commands /data/report_impact_header/compile_commands.json \
            --changed-file include/common/config.h \
            --format markdown

      - name: Package Linux CLI release artifact
        run: |
          set -eu
          mkdir -p release-assets/package
          container_id=$(docker create "cmake-xray:${{ steps.meta.outputs.tag }}")
          trap 'docker rm -f "$container_id" >/dev/null 2>&1 || true' EXIT
          docker cp "$container_id:/app/cmake-xray" release-assets/package/cmake-xray
          docker rm "$container_id"
          trap - EXIT

          cp LICENSE README.md release-assets/package/
          tar -C release-assets/package -czf "release-assets/${{ steps.meta.outputs.archive }}" \
            cmake-xray LICENSE README.md
          sha256sum "release-assets/${{ steps.meta.outputs.archive }}" \
            > "release-assets/${{ steps.meta.outputs.checksum }}"
          rm -rf release-assets/package

      - name: Prepare release notes
        run: |
          set -eu
          ver_esc=$(printf '%s' "${{ steps.meta.outputs.version }}" | sed 's/\./\\./g')
          notes_path="release-assets/release-notes.md"
          sed -n "/^## \\[$ver_esc\\]/,/^## \\[/{/^## \\[$ver_esc\\]/!{/^## \\[/!p}}" \
            CHANGELOG.md > "$notes_path"

          if [ ! -s "$notes_path" ]; then
            {
              echo "Release ${{ steps.meta.outputs.tag }}"
              echo
              echo "Automated release for ${{ steps.meta.outputs.tag }}."
              echo
              echo "Assets:"
              echo "- ${{ steps.meta.outputs.archive }}"
              echo "- OCI image: ${{ steps.meta.outputs.image_repo }}:${{ steps.meta.outputs.tag }}"
            } > "$notes_path"
          fi

      - name: Log in to GHCR
        run: echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Publish container image
        run: |
          set -eu
          image_repo="${{ steps.meta.outputs.image_repo }}"
          version="${{ steps.meta.outputs.version }}"
          tag="${{ steps.meta.outputs.tag }}"

          docker tag "cmake-xray:${tag}" "${image_repo}:${tag}"
          docker push "${image_repo}:${tag}"

          if [[ "$version" != *-* ]]; then
            docker tag "cmake-xray:${tag}" "${image_repo}:latest"
            docker push "${image_repo}:latest"
          fi

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          tag="${{ steps.meta.outputs.tag }}"
          archive="release-assets/${{ steps.meta.outputs.archive }}"
          checksum="release-assets/${{ steps.meta.outputs.checksum }}"
          notes="release-assets/release-notes.md"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --notes-file "$notes"
            gh release upload "$tag" "$archive" "$checksum" --clobber
          else
            gh release create "$tag" \
              --verify-tag \
              --title "$tag" \
              --notes-file "$notes" \
              "$archive" \
              "$checksum"
          fi
